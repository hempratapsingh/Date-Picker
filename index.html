<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date-Picker</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f4f4;
        }

        .datepicker{
            width: 300px;
            background: #fff;
            margin: 50px auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            padding: 15px;
        }

        .header{
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 10px;
        }

        .year{
            border: 2px solid black;
            width: 100%;
            height: 25px;
            display: flex;
            justify-content: center;
        }

        .year input{
            font-size: large;
            width: 100%;
        }

        .month{
            font-size: 18px;
        }
        .days{
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border-bottom: 2px solid black;
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .dates{
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        .dates div{
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #ddd;
        }

        .dates div:hover{
            background: #007bff;
            color: white;
        }

        .dates .active{
            background: #007bff;
            color: white;
        }

        .dates .today{
            border: 2px solid #007bff;
        }
    </style>
</head>
<body>
    <div class="datepicker">
        <div class="year">
            <input type="date">
        </div>
        <div class="header">
            <span class="prev">&#10094</span>
            <span class="month">April 2026</span>
            <span class="next">&#10095</span>
        </div>

        <div class="days">
            <div>Sun</div>
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
        </div>

        <div class="dates">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>7</div>
            <div>8</div>
            <div>9</div>
            <div>10</div>
            <div>11</div>
            <div>12</div>
            <div>13</div>
            <div>14</div>
            <div>15</div>
            <div>16</div>
            <div>17</div>
            <div>18</div>
            <div>19</div>
            <div>20</div>
            <div>21</div>
            <div>22</div>
            <div>23</div>
            <div>24</div>
            <div>25</div>
            <div>26</div>
            <div>27</div>
            <div>28</div>
            <div>29</div>
            <div>30</div>
            <div>31</div>
        </div>
    </div>
</body>
</html>
